<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mary ✨</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        :root {
            --color-primary: #6E4D54;
            --color-panel: rgba(110, 77, 84, 0.85);
            --color-accent-light: #F0CACD; 
            --color-white: #ffffff;
            --gradient-main: linear-gradient(135deg, #F0CACD 0%, #ffffff 40%, #d4a5a9 60%, #F0CACD 100%);
            --color-rotate-1: #F0CACD;
            --color-rotate-2: #ffffff;
            --color-rotate-3: #d4a5a9;
            --gradient-liquid: linear-gradient(90deg, #b38a8d, #F0CACD, #ffffff, #F0CACD, #b38a8d);
            --text-main: #ffffff;
            --font-script: 'Great Vibes', cursive;
        }

        body {
            margin: 0; background-color: var(--color-primary); color: var(--text-main);
            font-family: 'Lato', sans-serif; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }

        .sparkles-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px; z-index: -1;
            animation: twinkleBg 60s linear infinite;
        }
        @keyframes twinkleBg { from { background-position: 0 0; } to { background-position: 550px 550px; } }

        #loading-screen {
            position: fixed; inset: 0; background: var(--color-primary); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease-out; cursor: pointer;
        }
        .loader-title { 
            font-family: var(--font-script); background: var(--gradient-liquid); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; font-size: 5rem; padding: 20px;
            animation: shineText 3s linear infinite;
            background-size: 200% auto;
        }

        .container {
            background: var(--color-panel);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(240, 202, 205, 0.3); border-radius: 20px; width: 90%; max-width: 400px;
            max-height: 85vh; display: flex; flex-direction: column; position: relative; overflow: hidden;
            opacity: 0; transition: opacity 1s ease 0.5s; animation: borderGlow 4s infinite alternate;
            pointer-events: none; z-index: 1;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://xatimg.com/image/qY5OeG3upF00.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.25;
            z-index: -1;
            animation: bgZoom 15s infinite alternate ease-in-out;
        }

        @keyframes bgZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .container.visible { opacity: 1; pointer-events: auto; }

        @keyframes borderGlow {
            0% { box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-color: rgba(240, 202, 205, 0.3); }
            100% { box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 25px rgba(240, 202, 205, 0.3); border-color: rgba(240, 202, 205, 0.6); }
        }

        .glam-title {
            font-family: var(--font-script); font-size: 3.5rem; background: var(--gradient-liquid);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite; background-size: 200% auto;
            text-align: center; margin: 0;
        }

        @keyframes shineText { to { background-position: 200% center; } }

        .navbar ul { list-style: none; padding: 0; display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .navbar a { text-decoration: none; color: #eee; font-size: 0.8rem; padding: 5px 20px; transition: 0.3s; border: 1px solid transparent; }
        .navbar a.active { color: var(--color-primary); background: var(--gradient-main); border-radius: 15px; font-weight: bold; }

        #content-area { flex-grow: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; position: relative; z-index: 2; }
        .content-section.hidden { display: none; }

        .avatar-border { 
            width: 120px; height: 120px; margin: 0 auto 15px; padding: 4px; border-radius: 50%; position: relative;
            background: conic-gradient(from var(--angle), var(--color-rotate-1), var(--color-rotate-2), var(--color-rotate-3), var(--color-rotate-1));
            animation: rotateBackground 4s linear infinite; display: flex; align-items: center; justify-content: center;
        }
        
        @keyframes rotateBackground { to { --angle: 360deg; } }

        .main-avatar { 
            width: calc(100% - 2px); height: calc(100% - 2px); border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--color-primary); position: relative; z-index: 1; 
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 12px;
            border-left: 3px solid var(--color-accent-light);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-accent-light);
            font-weight: bold;
        }
        .info-value {
            font-size: 0.9rem;
            color: #fff;
        }

        .floating-toggle { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--color-primary); border: 1px solid var(--color-accent-light); border-radius: 50%; color: var(--color-accent-light); cursor: pointer; z-index: 1001; display: flex; align-items: center; justify-content: center; }
        .floating-toggle i { font-size: 24px; }
        .floating-toggle.active i { animation: spinDisc 3s linear infinite; }
        @keyframes spinDisc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .music-player { position: fixed; bottom: 80px; right: 20px; width: 210px; background: rgba(110, 77, 84, 0.95); border: 1px solid var(--color-accent-light); border-radius: 20px; padding: 15px; transition: 0.4s; z-index: 1000; text-align: center; backdrop-filter: blur(10px); }
        .hidden-player { opacity: 0; transform: translateY(20px) scale(0.8); pointer-events: none; }

        #play-btn { background: var(--gradient-main); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; color: var(--color-primary); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        
        .volume-container { display: flex; align-items: center; gap: 8px; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; }
        #volume-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(240, 202, 205, 0.2); border-radius: 5px; outline: none; }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: var(--color-accent-light); cursor: pointer; }

        .mouse-sparkle { position: fixed; width: 6px; height: 6px; background: var(--color-white); border-radius: 50%; pointer-events: none; z-index: 9999; animation: sparkleAnim 0.8s linear forwards; }
        @keyframes sparkleAnim { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0) translateY(20px); } }
    </style>
</head>
<body>

    <div class="sparkles-container"></div>

    <div id="loading-screen">
        <h1 class="loader-title">Mary</h1> 
    </div>

    <button id="toggle-player-btn" class="floating-toggle"><i class="ph-fill ph-disc"></i></button>
    
    <div id="music-player" class="music-player hidden-player">
        <div style="font-size:0.75rem; color:var(--color-accent-light); margin-bottom:12px; font-weight: bold;">PAULO LONDRA</div>
        <audio id="audio-player" loop preload="auto"></audio>
        <button id="play-btn"><i id="play-icon" class="ph-fill ph-play"></i></button>
        
        <div class="volume-container">
            <i class="ph-fill ph-speaker-low" style="font-size: 12px;"></i>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <i class="ph-fill ph-speaker-high" style="font-size: 12px;"></i>
        </div>
    </div>

    <div class="container">
        <header style="padding:20px; position: relative; z-index: 2;">
            <h1 class="glam-title">Mary</h1>
            <p style="color:var(--color-accent-light); font-size:0.6rem; letter-spacing:4px; text-align: center;">1536238631</p>
        </header>

        <nav class="navbar" style="position: relative; z-index: 2;">
            <ul>
                <li><a href="#" data-target="home-section" id="btn-home" class="active">𝐻𝑜𝑚𝑒</a></li>
                <li><a href="#" data-target="profile-section">𝐴𝑏𝑜𝑢𝑡 𝑚𝑒</a></li>
            </ul>
        </nav>

        <div id="content-area">
            <div id="home-section" class="content-section">
                <div class="avatar-border">
                    <img src="https://xatimg.com/image/hRRAb58b1Xas.jpg" class="main-avatar">
                </div>
            </div>

            <div id="profile-section" class="content-section hidden">
                <div class="info-item">
                    <span class="info-label">𝑆𝑡𝑎𝑡𝑢𝑠</span>
                    <span class="info-value">” 𝑵𝒐𝒕 𝒆𝒗𝒆𝒓𝒚𝒐𝒏𝒆 𝒖 𝒍𝒐𝒔𝒆 𝒊𝒔 𝒂 𝒍𝒐𝒔𝒔 ”</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">𝐿𝑜𝑐𝑎𝑡𝑖𝑜𝑛</span>
                    <span class="info-value" style="display: flex; align-items: center; gap: 8px;">
                        𝑀𝑜𝑟𝑟𝑜𝑐𝑐𝑜 <img src="https://flagcdn.com/w40/ma.png" style="width: 20px; border-radius: 2px;">
                    </span>
                </div>

                <div class="info-item">
                    <span class="info-label">𝑍𝑜𝑑𝑖𝑎𝑐 𝑠𝑖𝑔𝑛</span>
                    <span class="info-value" style="display: flex; align-items: center; gap: 8px;">
                        𝐿𝑖𝑜𝑛 <i class="ph-bold ph-lion" style="font-size: 1.1rem; color: var(--color-accent-light);"></i>
                    </span>
                </div>
            </div>
        </div>

        <footer style="text-align:center; padding:10px; font-size:0.5rem; color:#ddd; position: relative; z-index: 2;">
            DESIGNED  <a href="#" style="color:var(--color-accent-light); text-decoration:none;">KEMO</a> 
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loading = document.getElementById('loading-screen'),
                  container = document.querySelector('.container'),
                  audio = document.getElementById('audio-player'),
                  player = document.getElementById('music-player'),
                  playIcon = document.getElementById('play-icon'),
                  toggleBtn = document.getElementById('toggle-player-btn'),
                  volumeSlider = document.getElementById('volume-slider');

            audio.src = "https://files.catbox.moe/bjl4bi.mp3";
            audio.volume = 0.5;
            
            loading.onclick = () => {
                loading.style.opacity = '0';
                setTimeout(() => { loading.style.display = 'none'; }, 1000);
                container.classList.add('visible');
                
                audio.play().then(() => { 
                    playIcon.className = "ph-fill ph-pause";
                    toggleBtn.classList.add('active');
                }).catch(error => {
                    console.log("Autoplay blocked.");
                });
            };

            document.querySelectorAll('.navbar a').forEach(link => {
                link.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
                    document.getElementById(link.dataset.target).classList.remove('hidden');
                    document.querySelectorAll('.navbar a').forEach(a => a.classList.remove('active'));
                    link.classList.add('active');
                }
            });

            toggleBtn.onclick = () => player.classList.toggle('hidden-player');

            document.getElementById('play-btn').onclick = () => {
                if (audio.paused) { 
                    audio.play(); 
                    playIcon.className = "ph-fill ph-pause";
                    toggleBtn.classList.add('active');
                } else { 
                    audio.pause(); 
                    playIcon.className = "ph-fill ph-play";
                    toggleBtn.classList.remove('active');
                }
            };

            volumeSlider.oninput = (e) => {
                audio.volume = e.target.value;
            };

            document.addEventListener('mousemove', (e) => {
                if (Math.random() > 0.8) {
                    const s = document.createElement('div');
                    s.className = 'mouse-sparkle';
                    s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
                    document.body.appendChild(s);
                    setTimeout(() => s.remove(), 800);
                }
            });
        });
    </script>
</body>
</html>
